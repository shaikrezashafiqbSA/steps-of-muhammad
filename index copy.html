        ]
      },
      {
        category: "🛡️ Section 2 · Al-Ḥiṣn al-Ḥaṣīn",
        desc: "High-intensity defense modules, active metaphysical wards, and anti-debuff formulas",
        items: [
          { label: "Bismillahi ladhi ya Durru... (Harm Shield)", spec: "⚡ Instant Cast Ward", path: "start and end of day/evoke shield against harm.html" },

        ]
      },

          { label: "Tadabbur Framework Modules & Action Steps", spec: "💡 Contemplative Insights", path: "lore/quran-tadabbur.html" }

      },
      {

      const treeTarget = document.getElementById('navigation-tree');

    function toggleNode(index) {
      const selectedNode = document.getElementById(`node-${index}`);
      const isActive = selectedNode.classList.contains('active');
      
      // Collapse sibling nodes cleanly on new tree category activations
      document.querySelectorAll('.root-node').forEach(node => node.classList.remove('active'));
      
      if (!isActive) {
        selectedNode.classList.add('active');
      }
    }

    function initAudioEngine() {
      var tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      var firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }

    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-audio-player', {
        height: '0', width: '0', videoId: ROOT_CONFIG.youtubeAudioId,
        playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': ROOT_CONFIG.youtubeAudioId },
        events: { 'onReady': () => {
          const trigger = document.getElementById('emblem-trigger');
          trigger.addEventListener('mouseenter', () => player.playVideo());
          trigger.addEventListener('touchstart', () => player.playVideo());
        }}
      });
    }

    // Controls background layer cross-fade states elegantly on interaction
    function igniteNur() {
      const baseFlag = document.getElementById('bg-base');
      const nurFlag = document.getElementById('bg-nur');
      if (baseFlag && nurFlag) {
        baseFlag.style.opacity = '0';
        nurFlag.style.opacity = '0.75';
        nurFlag.style.transform = 'scale(1.03)';
      }
      if (document.querySelector('.base-flag')) document.querySelector('.base-flag').style.opacity = '0';
      if (document.querySelector('.nur-flag')) document.querySelector('.nur-flag').style.opacity = '1';
      if (player && typeof player.playVideo === 'function') player.playVideo();
    }

    function extinguishNur() {
      const baseFlag = document.getElementById('bg-base');
      const nurFlag = document.getElementById('bg-nur');
      if (baseFlag && nurFlag) {
        baseFlag.style.opacity = '0.55';
        nurFlag.style.opacity = '0';
        nurFlag.style.transform = 'scale(1.0)';
      }
      if (document.querySelector('.base-flag')) document.querySelector('.base-flag').style.opacity = '1';
      if (document.querySelector('.nur-flag')) document.querySelector('.nur-flag').style.opacity = '0';
    }
  </script>
