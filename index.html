<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="meta-title">Steps of Muhammad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Cross-fade for the spiritual emblem transformation */
    .emblem-container:hover .base-flag { opacity: 0; }
    .emblem-container:hover .nur-flag { opacity: 1; scale: 1.05; }
    .emblem-container:active .base-flag { opacity: 0; }
    .emblem-container:active .nur-flag { opacity: 1; scale: 1.05; }

    /* Fortress App Accordion Tree Transitions */
    .branch-container {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .root-node.active .branch-container {
      max-height: 600px; /* Provides vertical breathing room for content branches */
    }
    .chevron-icon {
      transition: transform 0.25s ease;
    }
    .root-node.active .chevron-icon {
      transform: rotate(180deg);
    }

    /* Smooth localized scrollbar aesthetics */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(5, 20, 11, 0.6);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(16, 185, 129, 0.2);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(52, 211, 153, 0.4);
    }
  </style>
</head>
<body class="bg-[#05140b] text-emerald-50 min-h-screen flex flex-col justify-between antialiased selection:bg-emerald-500/30 relative overflow-x-hidden">

  <div id="yt-audio-player" class="hidden"></div>

  <!-- ── CENTRALIZED, APPARENT FIXED BACKGROUND NALAYN ENGINE ── -->
  <div class="fixed inset-0 -z-10 flex items-center justify-center pointer-events-none select-none overflow-hidden">
    <!-- Base Nalayn state: Smaller (max-w-md/lg), perfectly centered, crisp visibility -->
    <img 
      id="bg-base"
      src="./Black Flag.jpeg" 
      alt="Nalayn Shareef - Base State" 
      class="w-full max-w-sm md:max-w-md h-auto object-contain transition-all duration-1000 ease-in-out opacity-55 saturate-[0.85]"
    />
    <!-- Active Nur Nalayn state: Cross-fades to radiant form on hover interaction -->
    <img 
      id="bg-nur"
      src="./Black Flag (nur).jpeg" 
      alt="Nalayn Shareef - Filled with Nur" 
      class="absolute w-full max-w-sm md:max-w-md h-auto object-contain transition-all duration-1000 ease-in-out opacity-0 scale-105"
    />
    <!-- Premium radial atmosphere overlay to fade edges beautifully into the dark background -->
    <div class="absolute inset-0 bg-gradient-to-t from-[#05140b] via-[#05140b]/75 to-[#05140b]/90"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_20%,#05140b_75%)]"></div>
  </div>

  <main class="flex-1 flex flex-col items-center justify-center p-6 min-w-0 relative z-10">
    <div class="max-w-2xl w-full text-center space-y-8 my-8">
      
      <!-- Top Emblem / Trigger Module -->
      <div class="space-y-4 flex flex-col items-center">
        <div id="emblem-trigger" 
             onmouseenter="igniteNur()" 
             onmouseleave="extinguishNur()"
             class="emblem-container relative w-40 h-40 rounded-full overflow-hidden border border-emerald-900 shadow-2xl transition-all duration-500 cursor-pointer group hover:border-emerald-500/50 hover:shadow-emerald-500/10">
          <img src="./Black Flag.jpeg" alt="Base State" class="base-flag absolute inset-0 w-full h-full object-cover object-center opacity-100 scale-100 transition-all duration-700 ease-in-out" />
          <img src="./Black Flag (nur).jpeg" alt="Filled with Nur" class="nur-flag absolute inset-0 w-full h-full object-cover object-center opacity-0 scale-100 transition-all duration-700 ease-in-out" />
          <div class="absolute inset-0 ring-1 ring-inset ring-emerald-400/20 rounded-full pointer-events-none group-hover:ring-emerald-400/50 transition-all duration-500"></div>
        </div>

        <div class="space-y-2 select-none">
          <h1 id="root-title" class="text-3xl md:text-4xl font-black tracking-widest bg-gradient-to-r from-emerald-400 via-teal-300 to-amber-400 bg-clip-text text-transparent uppercase">
            Follow the steps
          </h1>
          <p id="root-subtitle" class="text-xs md:text-sm font-mono text-emerald-600 uppercase tracking-widest max-w-md mx-auto leading-relaxed">
            Prophet Muhammad ﷺ
          </p>
        </div>

        <div class="w-full max-w-xs mx-auto pt-2 opacity-90 transition-opacity duration-300 hover:opacity-100 select-none">
          <img 
            src="./verse-3-31.jpeg" 
            alt="Surah Ali Imran Ayat 31 Screenshot" 
            class="w-full h-auto rounded-xl border border-emerald-900/60 shadow-2xl" 
          />
        </div>
      </div>

      <!-- ── ACCOMMODATING ACCORDION TREE MENU (ḤIṢN AL-MUSLIM SYSTEM) ── -->
      <div id="navigation-tree" class="w-full max-w-xl mx-auto text-left space-y-3 pt-4">
        <!-- Rendered Dynamically by Engine Script below -->
      </div>

    </div>
  </main>

  <footer class="w-full text-center text-[10px] text-emerald-800 font-mono tracking-widest uppercase pb-6 select-none relative z-10">
    Compiled for ✦ the foam of the seas
  </footer>

  <script>
    const ROOT_CONFIG = {
      title: "Follow the steps of",
      subtitle: "Prophet Muhammad ﷺ",
      youtubeAudioId: "8hTUDQEvqk8"
    };

    // =========================================================
    // VAULT ACCORDION DATA CONFIGURATION ENGINE
    // =========================================================
    const VAULT_NAVIGATION_TREE = [
      {
        category: "after solat",
        desc: "Prophetic Dua right after solat",
        items: [
          { label: "1) Istighfar + Source of Peace", path: "after solat/1_Istighfar_peace.html"},
          { label: "2a) Tahlil - When Facing Spiritual Lethargy or External Hostility", path: "after solat/2a_tahlil.html" },
          { label: "2b) Tahlil - When Facing Financial Anxiety or Material Decisions", path: "after solat/2b_tahlil.html" },
          { label: "Dua: Protect me from Hellfire", path: "after solat/dua-allahuma-ajirnaar.html" },

        ]
      },
            {
        category: "The Heart Shakers",
        desc: "Prophetic Dua for deeply anchoring and alignment to the command / amr",
        items: [
          { label: "Dua: Oh Turner of Hearts...", path: "dua-general/dua-turner-of-hearts.html" },
          { label: "Dua: In the Greatest of Names", path: "dua-general/dua-greatest-of-names.html" },
          { label: "Dua: Istikhara - Guidance", path: "dua-general/dua-istikhara.html" },
          { label: "Dua: Aisyah's Comprehensive ask", path: "dua-general/dua-comprehensive-aisyah.html" },
          { label: "Dua Set: Habeeb Umar", path: "dua-general/dua-habeeb-umar.html"}
        ]
      },
          {
        category: "Morning/Evening shields 🛡",
        desc: "Daily morning and evening adhkar",
        items: [
          { label: "Bismillahi ladhi ya Durru...", path: "/start and end of day/evoke shield against harm.html" },
        ]
      },
                  {
        category: "Grant us amal solihan (righteous work) / Destroy Laziness",
        desc: "Prophetic invigoration evocations for daily work",
        items: [
          { label: "Dua - ease of work", path: "dua-work/dua-la-sahlan.html" },
          { label: "Dua - ease of work", path: "dua-work/dua-laziness.html" },
          { label: "Dua - Musa before facing firaun", path: "dua-work/dua-musa-before-facing-firaun.html" }
        ]
      },
      {
        category: "Dua Collections of Sacred Months",
        desc: "Dhikr / Wird 💦🌱 pieced by mashuyuks related to the sacred months",
        items: [
          { label: "Takbir Eid ul Adha", path: "/Dua Haj/takbir-eiduladha.html" },
          { label: "Dua: Best Dua what all the Prophets made during Arafah", path: "Dua Haj/dua-prophets-made-on-arafah.html" },
          { label: "Dua: Ali and Ibn 'Umar during Arafah", path: "Dua Haj/dua-sahabah-made-on-arafah.html" },
          { label: "Dua Collection: Dhul Hijjah - First 10 Days", path: "Dua Haj/Amalan Haj.html" },
          { label: "Dua Collection: Istighfar Rajab", path: "Wird/istighfar-rajab.html" },
        ]
      },
      {
        category: "Dua for Healing",
        desc: "Prophetic restorative evocations",
        items: [
          { label: "Seeking Wellness Against Physical Ailments", path: "Dua Shifa/dua-shifa.html" },
          { label: "Full Ruqyah for face pains", path: "Dua Shifa/Ruqyah.html" }
        ]
      },
    ];

    // 🏗️ APPLICATION ENGINE ASSEMBLY
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('meta-title').textContent = ROOT_CONFIG.title;
      document.getElementById('root-title').textContent = ROOT_CONFIG.title;
      document.getElementById('root-subtitle').textContent = ROOT_CONFIG.subtitle;
      
      const treeTarget = document.getElementById('navigation-tree');
      let treeHTML = '';

      VAULT_NAVIGATION_TREE.forEach((node, index) => {
        treeHTML += `
          <div class="root-node border border-emerald-900/40 bg-[#071c10]/40 backdrop-blur-md rounded-xl overflow-hidden transition-all duration-200 shadow-lg shadow-black/20" id="node-${index}">
            
            <button onclick="toggleNode(${index})" class="w-full flex items-center justify-between p-4 bg-[#092213]/50 hover:bg-[#0c2e1a]/70 active:bg-[#061c10] transition-colors group text-left">
              <div class="space-y-1 pr-4">
                <span class="text-xs font-mono font-bold tracking-widest uppercase px-2.5 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 group-hover:text-emerald-300 transition-colors">
                  ${node.category}
                </span>
                <p class="text-[11px] text-emerald-400/60 leading-relaxed pt-1 font-sans group-hover:text-emerald-300/60 transition-colors">
                  -- ${node.desc}
                </p>
              </div>
              <div class="w-6 h-6 rounded-full border border-emerald-900/60 flex items-center justify-center text-[9px] text-emerald-500 bg-[#05140b] group-hover:border-emerald-500/40 flex-shrink-0 transition-all">
                <span class="chevron-icon inline-block transform origin-center">▼</span>
              </div>
            </button>

            <div class="branch-container bg-[#05140b]/30">
              <div class="p-2 space-y-0.5 border-t border-emerald-950/80">
                ${node.items.map(item => `
                  <a href="./${item.path}" 
                     onmouseenter="igniteNur()" 
                     onmouseleave="extinguishNur()"
                     class="flex items-start gap-3 p-3 rounded-lg text-xs font-medium text-emerald-300/80 hover:text-amber-300 hover:bg-[#092213]/60 transition-all group">
                    <span class="text-emerald-800 group-hover:text-amber-500 font-mono select-none">↳</span>
                    <span class="leading-relaxed">${item.label}</span>
                  </a>
                `).join('')}
              </div>
            </div>

          </div>`;
      });

      treeTarget.innerHTML = treeHTML;
      initAudioEngine();
    });

    function toggleNode(index) {
      const selectedNode = document.getElementById(`node-${index}`);
      const isActive = selectedNode.classList.contains('active');
      
      // Collapse sibling nodes cleanly on new tree category activations
      document.querySelectorAll('.root-node').forEach(node => node.classList.remove('active'));
      
      if (!isActive) {
        selectedNode.classList.add('active');
      }
    }

    function initAudioEngine() {
      var tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      var firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }

    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-audio-player', {
        height: '0', width: '0', videoId: ROOT_CONFIG.youtubeAudioId,
        playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': ROOT_CONFIG.youtubeAudioId },
        events: { 'onReady': () => {
          const trigger = document.getElementById('emblem-trigger');
          trigger.addEventListener('mouseenter', () => player.playVideo());
          trigger.addEventListener('touchstart', () => player.playVideo());
        }}
      });
    }

    // Controls crisp background layer cross-fade states elegantly on interaction
    function igniteNur() {
      const baseFlag = document.getElementById('bg-base');
      const nurFlag = document.getElementById('bg-nur');
      if (baseFlag && nurFlag) {
        baseFlag.style.opacity = '0';
        nurFlag.style.opacity = '0.75';
        nurFlag.style.transform = 'scale(1.03)';
      }
      document.querySelector('.base-flag').style.opacity = '0';
      document.querySelector('.nur-flag').style.opacity = '1';
      if (player && typeof player.playVideo === 'function') player.playVideo();
    }

    function extinguishNur() {
      const baseFlag = document.getElementById('bg-base');
      const nurFlag = document.getElementById('bg-nur');
      if (baseFlag && nurFlag) {
        baseFlag.style.opacity = '0.55';
        nurFlag.style.opacity = '0';
        nurFlag.style.transform = 'scale(1.0)';
      }
      document.querySelector('.base-flag').style.opacity = '1';
      document.querySelector('.nur-flag').style.opacity = '0';
    }
  </script>
</body>
</html>

```
