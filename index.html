<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Steps of Muhammad</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 antialiased">

  <div class="max-w-md w-full text-center space-y-8">
    
    <div class="space-y-4 flex flex-col items-center">
      
      <div class="relative w-32 h-32 rounded-full overflow-hidden border-2 border-amber-500/30 shadow-2xl shadow-amber-500/10 group">
        <img 
          src="nalayn.jpg" 
          alt="Nalayn Shareef - Steps of Muhammad" 
          class="w-full h-full object-cover object-center scale-105 transition-transform duration-700 group-hover:scale-110"
        />
        <div class="absolute inset-0 ring-1 ring-inset ring-amber-400/40 rounded-full pointer-events-none"></div>
      </div>

      <div class="space-y-1">
        <h1 class="text-3xl font-black tracking-wider bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent uppercase">
          Steps of Muhammad
        </h1>
        <p class="text-xs font-mono text-slate-500 uppercase tracking-widest">
          Choose your path or current state
        </p>
      </div>
    </div>

    <div class="space-y-4">
      
      <a href="Dua Haj/" class="group block bg-[#151d30] border border-slate-800 rounded-2xl p-6 text-left transition-all duration-300 hover:border-amber-500/50 hover:scale-[1.01] hover:shadow-xl hover:shadow-amber-500/5">
        <div class="flex items-center justify-between">
          <div class="space-y-1">
            <h2 class="text-lg font-bold text-slate-100 group-hover:text-amber-400 transition-colors">
              During Haj
            </h2>
            <p class="text-sm text-slate-400">
              Trace the prophetic steps and supplications for the sacred pilgrimage.
            </p>
          </div>
          <span class="text-2xl opacity-80 group-hover:opacity-100 transition-opacity">🕋</span>
        </div>
      </a>

      <a href="Dua Shifa/" class="group block bg-[#151d30] border border-slate-800 rounded-2xl p-6 text-left transition-all duration-300 hover:border-cyan-500/50 hover:scale-[1.01] hover:shadow-xl hover:shadow-cyan-500/5">
        <div class="flex items-center justify-between">
          <div class="space-y-1">
            <h2 class="text-lg font-bold text-slate-100 group-hover:text-cyan-400 transition-colors">
              During Sickness
            </h2>
            <p class="text-sm text-slate-400">
              Prophetic remedies, prayers for healing, and divine restoration.
            </p>
          </div>
          <span class="text-2xl opacity-80 group-hover:opacity-100 transition-opacity">🌱</span>
        </div>
      </a>

    </div>

    <footer class="text-[10px] text-slate-600 font-mono tracking-widest uppercase pt-4">
      Decentralized Word Vault ✦ Serverless
    </footer>

  </div>

</body>
</html>
