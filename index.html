<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="meta-title">Steps of Muhammad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Cross-fade for the spiritual emblem transformation */
    .emblem-container:hover .base-flag { opacity: 0; }
    .emblem-container:hover .nur-flag { opacity: 1; scale: 1.05; }
    .emblem-container:active .base-flag { opacity: 0; }
    .emblem-container:active .nur-flag { opacity: 1; scale: 1.05; }
  </style>
</head>
<body class="bg-[#05140b] text-emerald-50 min-h-screen flex flex-col justify-between antialiased selection:bg-emerald-500/30">

  <div id="yt-audio-player" class="hidden"></div>

  <main class="flex-1 flex flex-col items-center justify-center p-6 min-w-0">
    <div class="max-w-2xl w-full text-center space-y-8 my-8">
      
      <div class="space-y-4 flex flex-col items-center">
        <div id="emblem-trigger" class="emblem-container relative w-40 h-40 rounded-full overflow-hidden border border-emerald-900 shadow-2xl transition-all duration-500 cursor-pointer group hover:border-emerald-500/50 hover:shadow-emerald-500/10">
          <img src="./Black Flag.jpeg" alt="Base State" class="base-flag absolute inset-0 w-full h-full object-cover object-center opacity-100 scale-100 transition-all duration-700 ease-in-out" />
          <img src="./Black Flag (nur).jpeg" alt="Filled with Nur" class="nur-flag absolute inset-0 w-full h-full object-cover object-center opacity-0 scale-100 transition-all duration-700 ease-in-out" />
          <div class="absolute inset-0 ring-1 ring-inset ring-emerald-400/20 rounded-full pointer-events-none group-hover:ring-emerald-400/50 transition-all duration-500"></div>
        </div>

        <div class="space-y-2">
          <h1 id="root-title" class="text-3xl md:text-4xl font-black tracking-widest bg-gradient-to-r from-emerald-400 via-teal-300 to-amber-400 bg-clip-text text-transparent uppercase">
            Follow the steps
          </h1>
          <p id="root-subtitle" class="text-xs md:text-sm font-mono text-emerald-600 uppercase tracking-widest max-w-md mx-auto leading-relaxed">
            Prophet Muhammad ﷺ
          </p>
        </div>

        <div class="w-full max-w-xs mx-auto pt-2">
          <img 
            src="./verse-3-31.jpeg" 
            alt="Surah Ali Imran Ayat 31 Screenshot" 
            class="w-full h-auto rounded-xl border border-emerald-900/60 shadow-2xl transition-opacity duration-300 hover:opacity-95" 
          />
        </div>

      </div>

      <div id="categories-grid-target" class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-xl mx-auto pt-4">
      </div>

    </div>
  </main>

  <footer class="w-full text-center text-[10px] text-emerald-800 font-mono tracking-widest uppercase pb-6">
    Compiled for ✦ the foam of the seas
  </footer>

  <script>
    const ROOT_CONFIG = {
      title: "Follow the steps of",
      subtitle: "Prophet Muhammad ﷺ",
      youtubeAudioId: "8hTUDQEvqk8"
    };

    const ROOT_CATEGORIES = [
            { 
        path: "Wird/", 
        badge: "Wird 💦🌱",
        desc: "Liturgies and historical protective sequences across lineages."
      },
      { 
        path: "Dua Haj/", 
        badge: "Haj",
        desc: "Sacred Pilgrimage collection, station-by-station steps, and rituals."
      },
      { 
        path: "Dua Shifa/", 
        badge: "Remedies",
        desc: "Prophetic protection parameters and restorative healing remedies."
      },
    ];

    // 🏗️ ENGINE LOGIC (Do not edit below this line)
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('meta-title').textContent = ROOT_CONFIG.title;
      document.getElementById('root-title').textContent = ROOT_CONFIG.title;
      document.getElementById('root-subtitle').textContent = ROOT_CONFIG.subtitle;
      
      const gridTarget = document.getElementById('categories-grid-target');
      let gridHTML = '';

      ROOT_CATEGORIES.forEach(cat => {
        gridHTML += `
          <a href="./${cat.path}" 
             onmouseenter="igniteNur()" 
             onmouseleave="extinguishNur()"
             class="group relative block bg-[#092213]/60 border border-emerald-900/60 rounded-xl p-5 text-left transition-all duration-300 hover:border-emerald-500/40 hover:bg-[#0c2e1a] hover:scale-[1.02] hover:shadow-lg hover:shadow-emerald-500/5">
            <div class="flex flex-col h-full justify-between space-y-2">
              <div>
                <div class="flex items-center justify-between border-b border-emerald-900/40 pb-2 mb-2">
                  <span class="text-xs font-mono font-bold tracking-widest uppercase px-2.5 py-1 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 group-hover:text-emerald-300 group-hover:border-emerald-400/30 transition-colors">
                    ${cat.badge}
                  </span>
                  <span class="text-xs font-mono text-emerald-800 group-hover:text-emerald-400 transform group-hover:translate-x-0.5 transition-all">➔</span>
                </div>
                <p class="text-xs text-emerald-300/80 group-hover:text-emerald-200 leading-relaxed pt-0.5 transition-colors">
                  ${cat.desc}
                </p>
              </div>
            </div>
          </a>`;
      });

      gridTarget.innerHTML = gridHTML;
      initAudioEngine();
    });

    function initAudioEngine() {
      var tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      var firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }

    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-audio-player', {
        height: '0', width: '0', videoId: ROOT_CONFIG.youtubeAudioId,
        playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': ROOT_CONFIG.youtubeAudioId },
        events: { 'onReady': () => {
          const trigger = document.getElementById('emblem-trigger');
          trigger.addEventListener('mouseenter', () => player.playVideo());
          trigger.addEventListener('touchstart', () => player.playVideo());
        }}
      });
    }

    function igniteNur() {
      document.querySelector('.base-flag').style.opacity = '0';
      document.querySelector('.nur-flag').style.opacity = '1';
      if (player && typeof player.playVideo === 'function') player.playVideo();
    }

    function extinguishNur() {
      document.querySelector('.base-flag').style.opacity = '1';
      document.querySelector('.nur-flag').style.opacity = '0';
    }
  </script>
</body>
</html>
